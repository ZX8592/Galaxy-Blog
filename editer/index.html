<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星系博客编辑器</title>
  <link rel="preconnect" href="https://cdn.quilljs.com">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    :root[data-theme="light"] {
      --bg: #eef2f8;
      --bg-glow: rgba(122, 154, 255, 0.18);
      --sidebar: rgba(232, 238, 248, 0.92);
      --sidebar-strong: rgba(224, 231, 244, 0.98);
      --panel: rgba(255, 255, 255, 0.86);
      --panel-solid: #ffffff;
      --panel-soft: #f7f9fd;
      --text: #1b2433;
      --muted: #637089;
      --border: rgba(125, 146, 181, 0.18);
      --border-strong: rgba(125, 146, 181, 0.28);
      --accent: #3d6df2;
      --accent-soft: rgba(61, 109, 242, 0.12);
      --success: #256f3a;
      --danger: #cb4040;
      --shadow: 0 18px 60px rgba(103, 123, 170, 0.14);
      --glass: blur(18px);
    }

    :root[data-theme="dark"] {
      --bg: #0b1020;
      --bg-glow: rgba(76, 118, 255, 0.22);
      --sidebar: rgba(14, 21, 38, 0.92);
      --sidebar-strong: rgba(11, 17, 32, 0.98);
      --panel: rgba(18, 26, 48, 0.82);
      --panel-solid: #121a30;
      --panel-soft: #0f172b;
      --text: #e8eefc;
      --muted: #94a3c2;
      --border: rgba(124, 145, 184, 0.15);
      --border-strong: rgba(124, 145, 184, 0.28);
      --accent: #6d91ff;
      --accent-soft: rgba(109, 145, 255, 0.16);
      --success: #4ade80;
      --danger: #ff7878;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.34);
      --glass: blur(18px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 10%, var(--bg-glow), transparent 28%),
        radial-gradient(circle at 82% 0%, rgba(255, 255, 255, 0.32), transparent 24%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    #app {
      height: 100vh;
    }

    .icon-btn,
    .dock-btn,
    .ghost-btn,
    .upload-btn {
      appearance: none;
      border: none;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, opacity 0.18s ease, border-color 0.18s ease;
    }

    .icon-btn:hover,
    .dock-btn:hover,
    .ghost-btn:hover,
    .upload-btn:hover {
      transform: translateY(-1px);
    }

    .ghost-btn {
      min-height: 42px;
      border-radius: 14px;
      padding: 0 14px;
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .ghost-btn.active {
      border-color: rgba(61, 109, 242, 0.3);
      background: var(--accent-soft);
    }

    .danger-btn {
      border: 1px solid rgba(203, 64, 64, 0.2);
      color: var(--danger);
      background: rgba(203, 64, 64, 0.05);
    }

    .danger-btn:hover {
      background: rgba(203, 64, 64, 0.1);
    }

    .toast {
      position: fixed;
      z-index: 45;
      top: 78px;
      right: 24px;
      max-width: min(420px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--panel-solid);
      color: var(--muted);
      box-shadow: var(--shadow);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .toast.success {
      color: var(--success);
      border-color: rgba(37, 111, 58, 0.18);
    }

    .toast.error {
      color: var(--danger);
      border-color: rgba(203, 64, 64, 0.18);
    }
    .layout {
      position: relative;
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      height: 100%;
      transition: grid-template-columns 0.24s ease;
    }

    .layout.expanded {
      grid-template-columns: 320px minmax(0, 1fr);
    }

    .sidebar {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 0;
      padding: 18px 14px 16px;
      background: var(--sidebar);
      backdrop-filter: var(--glass);
      border-right: 1px solid var(--border);
      transition: width 0.24s ease, transform 0.24s ease;
    }

    .sidebar-toggle {
      position: absolute;
      left: 20px;
      top: 18px;
      z-index: 30;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: transparent;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
    }

    .sidebar-toggle:hover {
      background: var(--accent-soft);
    }

    .sidebar-top {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 10px 0 52px;
      min-height: 46px;
      justify-content: center;
    }

    .sidebar-brand strong {
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .sidebar-brand span {
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .quick-create {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      padding: 0 16px;
      backdrop-filter: var(--glass);
    }

    .quick-create .icon {
      font-size: 1.2rem;
      line-height: 1;
    }

    .layout:not(.expanded) .quick-create {
      width: 52px;
      padding: 0;
      justify-content: center;
      align-self: center;
      box-shadow: none;
      background: transparent;
      border-color: transparent;
    }

    .layout:not(.expanded) .with-label,
    .layout:not(.expanded) .sidebar-brand,
    .layout:not(.expanded) .sidebar-scroll,
    .layout:not(.expanded) .sidebar-panel {
      display: none;
    }

    .sidebar-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-title {
      margin: 0;
      padding: 0 10px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      border: 1px solid transparent;
      border-radius: 18px;
      background: transparent;
      color: var(--text);
      padding: 12px 14px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item strong {
      font-size: 0.96rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-item span {
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-item:hover {
      border-color: var(--border-strong);
      background: rgba(255, 255, 255, 0.18);
    }

    .nav-item.active {
      background: var(--accent-soft);
      border-color: rgba(61, 109, 242, 0.22);
    }

    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-panel {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: var(--glass);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-title {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .panel-title strong {
      font-size: 0.95rem;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .sidebar-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar-form label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 0.76rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sidebar-form input,
    .sidebar-form select,
    .sidebar-form textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      padding: 11px 12px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .sidebar-form input:focus,
    .sidebar-form select:focus,
    .sidebar-form textarea:focus {
      outline: none;
      border-color: rgba(61, 109, 242, 0.4);
      box-shadow: 0 0 0 3px rgba(61, 109, 242, 0.14);
    }

    .panel-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .dock {
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }

    .dock-btn {
      flex: 1;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 14px;
      backdrop-filter: var(--glass);
    }

    .dock-btn.active {
      background: var(--accent-soft);
      border-color: rgba(61, 109, 242, 0.24);
    }

    .layout:not(.expanded) .dock {
      flex-direction: column;
      gap: 10px;
    }

    .layout:not(.expanded) .dock-btn {
      width: 52px;
      height: 52px;
      padding: 0;
      align-self: center;
      flex: none;
      box-shadow: none;
      background: transparent;
      border-color: transparent;
    }

    .upload-btn {
      position: fixed;
      z-index: 40;
      top: 20px;
      right: 24px;
      min-width: 104px;
      height: 48px;
      border-radius: 999px;
      padding: 0 18px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: 0 16px 40px rgba(61, 109, 242, 0.25);
    }

    .upload-btn:hover {
      background: #2f5de0;
    }

    .upload-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .sidebar-backdrop {
      display: none;
    }
    .workspace {
      position: relative;
      min-width: 0;
      overflow-y: auto;
      padding: 92px 28px 28px;
    }

    .workspace-inner {
      max-width: 1040px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .surface {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: var(--glass);
    }

    .surface-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .surface-header h2,
    .surface-header h3 {
      margin: 0;
      font-size: 1.16rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .surface-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .form-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    .form-field label {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      padding: 13px 14px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      outline: none;
      border-color: rgba(61, 109, 242, 0.38);
      box-shadow: 0 0 0 3px rgba(61, 109, 242, 0.12);
    }

    .chip-row {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .color-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
    }

    .color-chip input[type="color"] {
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 14px;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .color-chip strong,
    .color-chip span {
      display: block;
    }

    .color-chip strong {
      font-size: 0.92rem;
      margin-bottom: 4px;
    }

    .color-chip span {
      font-size: 0.82rem;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .toggle-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel-soft);
      margin-top: 18px;
    }

    .toggle-card input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .sub-surface {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel-soft);
      padding: 18px;
    }

    .ql-toolbar.ql-snow,
    .ql-container.ql-snow {
      border-color: var(--border);
      background: var(--panel-soft);
      color: var(--text);
    }

    .ql-toolbar.ql-snow {
      border-radius: 16px 16px 0 0;
    }

    .ql-container.ql-snow {
      border-radius: 0 0 16px 16px;
      min-height: 260px;
      font-size: 1rem;
    }

    .ql-toolbar.ql-snow .ql-stroke {
      stroke: var(--muted);
    }

    .ql-toolbar.ql-snow .ql-fill {
      fill: var(--muted);
    }

    .ql-toolbar.ql-snow .ql-picker {
      color: var(--muted);
    }

    .source-editor {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      padding: 13px 14px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .empty-state {
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border-strong);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.22);
      padding: 28px;
    }

    @media (max-width: 1180px) {
      .chip-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      #app {
        min-height: 100vh;
        height: auto;
      }

      .layout,
      .layout.expanded {
        display: block;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: min(88vw, 340px);
        background: var(--sidebar-strong);
        transform: translateX(-105%);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
      }

      .layout.expanded .sidebar {
        transform: translateX(0);
      }

      .sidebar-backdrop {
        position: fixed;
        inset: 0;
        z-index: 18;
        background: rgba(7, 12, 24, 0.24);
        backdrop-filter: blur(4px);
        display: block;
      }

      .workspace {
        padding: 88px 16px 20px;
      }

      .surface {
        padding: 18px;
        border-radius: 22px;
      }

      .form-grid,
      .chip-row {
        grid-template-columns: 1fr;
      }

      .upload-btn {
        top: 16px;
        right: 16px;
        min-width: 88px;
        height: 44px;
      }

      .toast {
        right: 16px;
        left: 16px;
        top: 70px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="layout" :class="{ expanded: isSidebarExpanded }">
      <button class="icon-btn sidebar-toggle" @click="toggleSidebar" :aria-label="sidebarToggleLabel">{{ isSidebarExpanded ? '☰' : '☰' }}</button>

      <button class="upload-btn" @click="saveData" :disabled="isBusy || !canSave">{{ uploadButtonLabel }}</button>
      <div v-if="saveStatus" :class="['toast', saveStatus.type]">{{ saveStatus.msg }}</div>

      <div v-if="isCompactScreen && isSidebarExpanded" class="sidebar-backdrop" @click="closeSidebar"></div>

      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="sidebar-brand">
            <strong>Galaxy Editor</strong>
            <span>{{ currentSelectionLabel }}</span>
          </div>

          <button class="quick-create" @click="addPlanet">
            <span class="icon">＋</span>
            <span class="with-label">新增行星</span>
          </button>
        </div>

        <div class="sidebar-scroll">
          <p class="section-title">内容导航</p>
          <div class="nav-list">
            <button class="nav-item" :class="{ active: activeIndex === -1 }" @click="selectStarHome">
              <strong>恒星首页</strong>
              <span>编辑站点标题、首页文案与恒星颜色</span>
            </button>

            <button
              v-for="(planet, index) in planets"
              :key="index"
              class="nav-item"
              :class="{ active: activeIndex === index }"
              @click="selectPlanet(index)"
            >
              <strong>{{ planet.name || '未命名行星' }}</strong>
              <span>{{ planet.date || '未设置日期' }} · {{ planet.moons?.length || 0 }} 个卫星</span>
            </button>
          </div>
        </div>

        <div class="sidebar-bottom">
          <div v-if="isSidebarExpanded && activeSidebarPanel === 'repo'" class="sidebar-panel">
            <div class="panel-title">
              <strong>仓库连接</strong>
              <span>这里的配置只保存在当前浏览器，用于 GitHub Pages 上直接读写仓库内容。</span>
            </div>

            <div class="sidebar-form">
              <label>
                GitHub 用户名
                <input type="text" v-model.trim="repoConfig.owner" placeholder="your-name">
              </label>
              <label>
                仓库名
                <input type="text" v-model.trim="repoConfig.repo" placeholder="galaxy-blog">
              </label>
              <label>
                分支
                <input type="text" v-model.trim="repoConfig.branch" placeholder="main">
              </label>
              <label>
                数据文件路径
                <input type="text" v-model.trim="repoConfig.filePath" placeholder="src/blogData.js">
              </label>
              <label>
                GitHub Token
                <input type="password" v-model.trim="repoConfig.token" placeholder="github_pat_xxx / ghp_xxx">
              </label>
            </div>

            <label class="ghost-btn" style="justify-content: flex-start; gap: 10px;">
              <input type="checkbox" v-model="repoConfig.persistToken">
              <span>记住当前设备上的 Token</span>
            </label>

            <div class="ghost-btn" style="justify-content: flex-start; cursor: default;">
              当前目标：{{ currentSourceLabel }}
            </div>

            <div class="panel-row">
              <button class="ghost-btn" @click="saveRepoSettings">保存连接</button>
              <button class="ghost-btn" @click="loadData" :disabled="isBusy || !canLoad">重新读取</button>
            </div>
          </div>

          <div v-if="isSidebarExpanded && activeSidebarPanel === 'theme'" class="sidebar-panel">
            <div class="panel-title">
              <strong>外观主题</strong>
              <span>切换编辑器明暗风格，保持和你的工作环境一致。</span>
            </div>

            <div class="panel-row">
              <button class="ghost-btn" :class="{ active: currentTheme === 'light' }" @click="setTheme('light')">浅色</button>
              <button class="ghost-btn" :class="{ active: currentTheme === 'dark' }" @click="setTheme('dark')">深色</button>
            </div>
          </div>

          <div class="dock">
            <button class="dock-btn" :class="{ active: activeSidebarPanel === 'repo' && isSidebarExpanded }" @click="openSidebarPanel('repo')">
              <span>⌘</span>
              <span class="with-label">仓库</span>
            </button>
            <button class="dock-btn" :class="{ active: activeSidebarPanel === 'theme' && isSidebarExpanded }" @click="openSidebarPanel('theme')">
              <span>⚙</span>
              <span class="with-label">主题</span>
            </button>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <div class="workspace-inner" v-if="starData">
          <template v-if="activeIndex === -1">
            <section class="surface">
              <div class="surface-header">
                <div>
                  <h2>全局配置</h2>
                  <p>这些内容会影响浏览器标题、首页恒星介绍区和主站欢迎文案。</p>
                </div>
              </div>
              <div class="form-grid">
                <div class="form-field full">
                  <label>网页标题</label>
                  <input type="text" v-model="starData.name" placeholder="例如：Galaxy Blog - 星系博客">
                </div>
                <div class="form-field">
                  <label>顶部标签</label>
                  <input type="text" v-model="starData.label" placeholder="例如：✦ GALAXY BLOG ✦">
                </div>
                <div class="form-field">
                  <label>主标题</label>
                  <input type="text" v-model="starData.title" placeholder="例如：星系博客">
                </div>
                <div class="form-field">
                  <label>副标题</label>
                  <input type="text" v-model="starData.meta" placeholder="例如：探索无垠的思想宇宙">
                </div>
                <div class="form-field">
                  <label>统计文案</label>
                  <input type="text" v-model="starData.statsText" placeholder="例如：∞ 无限想象">
                </div>
                <div class="form-field full">
                  <label>提示文案</label>
                  <input type="text" v-model="starData.hint" placeholder="例如：← 点击恒星查看更多 →">
                </div>
                <div class="form-field">
                  <label>恒星大小</label>
                  <input type="number" step="0.1" v-model.number="starData.size">
                </div>
              </div>
            </section>

            <section class="surface">
              <div class="surface-header">
                <div>
                  <h2>恒星颜色</h2>
                  <p>控制核心色、辉光色和外层日冕色，让首页氛围更统一。</p>
                </div>
              </div>
              <div class="chip-row">
                <div class="color-chip">
                  <input type="color" v-model="starData.colors.core">
                  <div>
                    <strong>核心颜色</strong>
                    <span>{{ starData.colors.core }}</span>
                  </div>
                </div>
                <div class="color-chip">
                  <input type="color" v-model="starData.colors.halo">
                  <div>
                    <strong>辉光颜色</strong>
                    <span>{{ starData.colors.halo }}</span>
                  </div>
                </div>
                <div class="color-chip">
                  <input type="color" v-model="starData.colors.corona">
                  <div>
                    <strong>日冕颜色</strong>
                    <span>{{ starData.colors.corona }}</span>
                  </div>
                </div>
              </div>
            </section>

            <section class="surface">
              <div class="surface-header">
                <div>
                  <h2>首页正文</h2>
                  <p>支持富文本、图片与 HTML 源码切换，适合写欢迎内容或站点介绍。</p>
                </div>
              </div>
              <rich-editor v-model="starData.body"></rich-editor>
            </section>
          </template>

          <template v-else-if="activePlanet">
            <section class="surface">
              <div class="surface-header">
                <div>
                  <h2>行星基础信息</h2>
                  <p>配置名称、轨道、展示形式和日期，决定这篇内容在主站中的呈现。</p>
                </div>
                <button class="ghost-btn danger-btn" @click="deletePlanet(activeIndex)">删除这个行星</button>
              </div>

              <div class="form-grid">
                <div class="form-field">
                  <label>行星名称</label>
                  <input type="text" v-model="activePlanet.name" placeholder="例如：起源星">
                </div>
                <div class="form-field">
                  <label>副标题</label>
                  <input type="text" v-model="activePlanet.subtitle" placeholder="一句短描述">
                </div>
                <div class="form-field">
                  <label>日期</label>
                  <input type="date" v-model="activePlanet.date">
                </div>
                <div class="form-field">
                  <label>轨道半径</label>
                  <input type="number" step="0.5" v-model.number="activePlanet.orbitRadius">
                </div>
                <div class="form-field">
                  <label>公转速度</label>
                  <input type="number" step="0.001" v-model.number="activePlanet.orbitSpeed">
                </div>
                <div class="form-field">
                  <label>自转速度</label>
                  <input type="number" step="0.01" v-model.number="activePlanet.spinSpeed">
                </div>
                <div class="form-field">
                  <label>行星尺寸</label>
                  <input type="number" step="0.05" v-model.number="activePlanet.size">
                </div>
                <div class="form-field">
                  <label>内容类型</label>
                  <select v-model="activePlanet.type">
                    <option value="html">富文本 HTML</option>
                    <option value="iframe">嵌入网页 iframe</option>
                    <option value="link">外部链接</option>
                  </select>
                </div>
                <div class="form-field full" v-if="activePlanet.type === 'iframe' || activePlanet.type === 'link'">
                  <label>目标 URL</label>
                  <input type="url" v-model="activePlanet.url" placeholder="https://...">
                </div>
              </div>
            </section>

            <section class="surface">
              <div class="surface-header">
                <div>
                  <h2>行星视觉</h2>
                  <p>颜色、大气和星环会影响首页行星的辨识度与整体层次。</p>
                </div>
              </div>

              <div class="chip-row">
                <div class="color-chip">
                  <input type="color" v-model="activePlanet.colors.base">
                  <div>
                    <strong>基础颜色</strong>
                    <span>{{ activePlanet.colors.base }}</span>
                  </div>
                </div>
                <div class="color-chip">
                  <input type="color" v-model="activePlanet.colors.accent">
                  <div>
                    <strong>强调颜色</strong>
                    <span>{{ activePlanet.colors.accent }}</span>
                  </div>
                </div>
                <div class="color-chip">
                  <input type="color" v-model="activePlanet.colors.atmosphere">
                  <div>
                    <strong>大气颜色</strong>
                    <span>{{ activePlanet.colors.atmosphere }}</span>
                  </div>
                </div>
              </div>

              <div class="toggle-card">
                <input type="checkbox" v-model="activePlanet.hasRing" id="planet-ring-toggle">
                <label for="planet-ring-toggle" style="cursor: pointer;">启用星环</label>
                <div class="form-field" style="margin-left: auto; min-width: 180px;" v-if="activePlanet.hasRing">
                  <label>星环颜色</label>
                  <input type="color" v-model="activePlanet.ringColor">
                </div>
              </div>
            </section>

            <section class="surface" v-if="activePlanet.type === 'html'">
              <div class="surface-header">
                <div>
                  <h2>行星正文</h2>
                  <p>点击主站中的行星后，就会展示这里的主要内容。</p>
                </div>
              </div>
              <rich-editor v-model="activePlanet.content"></rich-editor>
            </section>

            <section class="surface">
              <div class="surface-header">
                <div>
                  <h2>卫星内容</h2>
                  <p>卫星适合承载二级文章、外链或补充页面，让内容层级更丰富。</p>
                </div>
                <button class="ghost-btn" @click="addMoon">新增卫星</button>
              </div>

              <div v-if="activePlanet.moons && activePlanet.moons.length">
                <div class="sub-surface" v-for="(moon, moonIndex) in activePlanet.moons" :key="moonIndex" style="margin-bottom: 16px;">
                  <div class="surface-header" style="margin-bottom: 16px;">
                    <div>
                      <h3>卫星 {{ moonIndex + 1 }} · {{ moon.name || '未命名卫星' }}</h3>
                    </div>
                    <button class="ghost-btn danger-btn" @click="activePlanet.moons.splice(moonIndex, 1)">删除卫星</button>
                  </div>

                  <div class="form-grid">
                    <div class="form-field">
                      <label>名称</label>
                      <input type="text" v-model="moon.name" placeholder="例如：回声卫星">
                    </div>
                    <div class="form-field">
                      <label>尺寸</label>
                      <input type="number" step="0.1" v-model.number="moon.size">
                    </div>
                    <div class="form-field">
                      <label>内容类型</label>
                      <select v-model="moon.type">
                        <option value="html">富文本 HTML</option>
                        <option value="iframe">嵌入网页 iframe</option>
                        <option value="link">外部链接</option>
                      </select>
                    </div>
                    <div class="form-field full" v-if="moon.type === 'iframe' || moon.type === 'link'">
                      <label>目标 URL</label>
                      <input type="url" v-model="moon.url" placeholder="https://...">
                    </div>
                  </div>

                  <div class="chip-row" style="margin-top: 16px;">
                    <div class="color-chip">
                      <input type="color" v-model="moon.colors.base">
                      <div>
                        <strong>基础颜色</strong>
                        <span>{{ moon.colors.base }}</span>
                      </div>
                    </div>
                    <div class="color-chip">
                      <input type="color" v-model="moon.colors.accent">
                      <div>
                        <strong>强调颜色</strong>
                        <span>{{ moon.colors.accent }}</span>
                      </div>
                    </div>
                    <div class="color-chip">
                      <input type="color" v-model="moon.colors.atmosphere">
                      <div>
                        <strong>大气颜色</strong>
                        <span>{{ moon.colors.atmosphere }}</span>
                      </div>
                    </div>
                  </div>

                  <div style="margin-top: 16px;" v-if="moon.type === 'html'">
                    <rich-editor v-model="moon.content"></rich-editor>
                  </div>
                </div>
              </div>
              <div v-else class="empty-state">
                当前行星还没有卫星内容，可以在这里继续扩展子页面。
              </div>
            </section>
          </template>
        </div>

        <div class="workspace-inner" v-else>
          <div class="empty-state">
            正在准备编辑器数据……
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
